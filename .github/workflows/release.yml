name: Release on Push to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pyyaml

      - name: Lint with ruff
        run: |
          ruff check app/ --output-format=github

      - name: Validate config.yaml
        run: |
          python -c "
          import yaml
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          required = ['name', 'description', 'version', 'slug', 'arch']
          for key in required:
              assert key in config, f'Missing required key: {key}'
          print('config.yaml is valid')
          "

      - name: Validate Dockerfile
        run: |
          # Basic Dockerfile syntax check
          if head -1 Dockerfile | grep -qE '^ARG|^FROM'; then
            echo "Dockerfile looks valid"
          else
            echo "Dockerfile may have issues"
            exit 1
          fi

  release:
    name: Bump Version & Release
    runs-on: ubuntu-latest
    needs: lint  # Only release if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in config.yaml
        id: bump
        run: |
          # Extract current version
          CURRENT=$(grep '^version:' config.yaml | sed 's/version: *"\?\([^"]*\)"\?/\1/')
          echo "Current version: $CURRENT"

          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update config.yaml in place
          sed -i "s/^version:.*/version: \"${NEW_VERSION}\"/" config.yaml

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add config.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main

      - name: Generate release notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | grep -v "\[skip ci\]")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20 | grep -v "\[skip ci\]")
          fi

          echo "## Changes" > release_notes.md
          echo "" >> release_notes.md
          if [ -n "$COMMITS" ]; then
            echo "$COMMITS" >> release_notes.md
          else
            echo "- Patch release" >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Auto-generated release from commit $(git rev-parse --short HEAD)*" >> release_notes.md

      - name: Create tag and release
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Build add-on archive
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          mkdir -p release
          tar czf "release/personal-assistant-addon-${TAG}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='release' \
            --exclude='plans' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            config.yaml \
            Dockerfile \
            run.sh \
            repository.yaml \
            app/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: "v${{ steps.bump.outputs.version }}"
          body_path: release_notes.md
          files: release/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
