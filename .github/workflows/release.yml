name: Release on Push to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Get version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\?\([^"]*\)"\?/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Generate release notes from commits
        id: release_notes
        run: |
          # Get commits since last tag (or all if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Write to file (multi-line output)
          echo "## Changes" > release_notes.md
          echo "" >> release_notes.md
          echo "$COMMITS" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Auto-generated release from commit $(git rev-parse --short HEAD)*" >> release_notes.md

      - name: Create release tag
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # If tag already exists, append build number
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            BUILD_NUM=$(git tag -l "${TAG}-*" | wc -l | tr -d ' ')
            BUILD_NUM=$((BUILD_NUM + 1))
            TAG="${TAG}-b${BUILD_NUM}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Build add-on archive
        run: |
          # Create a clean release archive
          mkdir -p release
          tar czf "release/personal-assistant-addon-${{ steps.tag.outputs.tag }}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='release' \
            --exclude='plans' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            config.yaml \
            Dockerfile \
            run.sh \
            repository.yaml \
            app/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body_path: release_notes.md
          files: release/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check app/ --output-format=github

      - name: Validate config.yaml
        run: |
          python -c "
          import yaml
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          required = ['name', 'description', 'version', 'slug', 'arch']
          for key in required:
              assert key in config, f'Missing required key: {key}'
          print('config.yaml is valid')
          "

      - name: Validate Dockerfile
        run: |
          # Basic Dockerfile syntax check
          if head -1 Dockerfile | grep -qE '^ARG|^FROM'; then
            echo "Dockerfile looks valid"
          else
            echo "Dockerfile may have issues"
            exit 1
          fi
